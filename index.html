<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cash Thaïlande</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#07070f;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:#eeeef8}
input,button,select,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{display:none}
#app{max-width:430px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column}
.page{display:none;overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}
.page.on{display:block}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(7,7,15,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.07);display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom,0px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0 10px;background:none;border:none;color:#3a3a5a;font-size:10px;font-weight:600;cursor:pointer;transition:color .2s}
.nb.on{color:#818cf8}
.nb-icon{font-size:22px}
.fab-wrap{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))}
.fab{width:54px;height:54px;background:#818cf8;border-radius:50%;border:none;cursor:pointer;font-size:28px;color:#fff;position:absolute;top:-22px;box-shadow:0 0 0 4px #07070f,0 8px 24px rgba(129,140,248,.5);display:flex;align-items:center;justify-content:center}
.fab-label{font-size:10px;font-weight:600;color:#3a3a5a;margin-top:34px}
.hd{padding:calc(env(safe-area-inset-top,16px) + 14px) 20px 0;display:flex;align-items:center;justify-content:space-between}
.hd-sub{font-size:11px;font-weight:700;letter-spacing:2px;color:#3a3a5a;text-transform:uppercase}
.hd-title{font-size:22px;font-weight:800;margin-top:2px}
.btn-sm{background:#0e0e1c;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 14px;color:#7777aa;font-size:13px;font-weight:700;cursor:pointer}
.btn-green{border-color:rgba(34,197,94,.3);color:#22c55e}
.hero{background:linear-gradient(135deg,#0d0d20,#111128);border:1px solid rgba(129,140,248,.18);border-radius:20px;padding:22px;margin:16px 20px 0;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:radial-gradient(circle,rgba(129,140,248,.07),transparent 70%);pointer-events:none}
.hero-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#7777aa;margin-bottom:8px}
.hero-amount{font-size:42px;font-weight:800;line-height:1;letter-spacing:-1.5px}
.hero-eur{font-size:15px;color:#7777aa;margin-top:6px;font-weight:500}
.pills{display:flex;gap:10px;margin-top:18px}
.pill{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px}
.pill-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#3a3a5a;margin-bottom:4px}
.pill-val{font-size:17px;font-weight:700}
.pill-eur{font-size:11px;color:#7777aa;margin-top:2px}
.prog-wrap{margin-top:18px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#7777aa;margin-bottom:6px;font-weight:500}
.prog-track{height:6px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.prog-bar{height:6px;border-radius:99px;transition:width .6s ease}
.info-cards{display:flex;gap:10px;margin:12px 20px 0}
.info-card{flex:1;background:#0e0e1c;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px}
.info-card-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#3a3a5a;margin-bottom:4px}
.info-card-val{font-size:15px;font-weight:800}
.info-card-sub{font-size:10px;color:#7777aa;margin-top:2px}
.alert-bar{margin:12px 20px 0;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#f59e0b}
.sec-head{display:flex;justify-content:space-between;align-items:center;padding:20px 20px 10px}
.sec-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#3a3a5a}
.sec-action{background:none;border:none;color:#818cf8;font-size:12px;font-weight:600;cursor:pointer}
.tx-list{padding:0 20px}
.tx{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:16px;background:#0e0e1c;border:1px solid rgba(255,255,255,.07);margin-bottom:8px;cursor:pointer;-webkit-user-select:none}
.tx:active{background:#13132a}
.tx-ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:#7777aa;margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}
.chip-card{background:rgba(56,189,248,.15);color:#38bdf8}
.tx-right{text-align:right;flex-shrink:0}
.tx-thb{font-size:15px;font-weight:700}
.tx-eur-sm{font-size:11px;color:#7777aa;margin-top:2px}
